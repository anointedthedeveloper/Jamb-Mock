<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CBT Exam System | Login</title>
<link rel="stylesheet" href="/css/style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="portal-body">

<div class="bg-waves">
  <div class="wave"></div>
  <div class="wave"></div>
  <div class="wave"></div>
</div>

<!-- ── JOIN PAGE ── -->
<main id="page-join" class="page active">
  <div class="join-card">
    <div class="logo">
      <img class="dynamic-logo" src="/img/jamb.png" alt="Logo" onerror="this.src='/img/jamb.png'"/>
    </div>
    <h1>CBT Exam System</h1>
    <p class="subtitle">Secure Examination Environment</p>
    
    <div class="form-group">
      <label>Session Code</label>
      <div class="input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="inp-code" type="text" placeholder="e.g. A1B2C3" maxlength="6" autocomplete="off"/>
      </div>
    </div>

    <div class="form-group">
      <label>Full Name</label>
      <div class="input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input id="inp-name" type="text" placeholder="Your full name" autocomplete="off"/>
      </div>
    </div>

    <div class="form-group">
      <label>Student ID</label>
      <div class="input-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="input-icon"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M7 3v18"/><path d="M3 7h18"/><path d="M3 11h18"/><path d="M3 15h18"/><path d="M3 19h18"/></svg>
        <input id="inp-id" type="text" placeholder="Your student ID" autocomplete="off"/>
      </div>
    </div>

    <div id="join-error" class="error-msg hidden"></div>
    
    <button id="btn-join" class="btn btn-primary btn-full" onclick="joinExam()">
      Join Exam
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-arrow"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
  </div>
</main>

<script src="/js/app.js"></script>
</body>
</html>
